services:
  # PHP container for your scraping logic
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: scraper-app
    container_name: scraper-app
    tty: true
    volumes:
      - .:/var/www/html:z  # The :z maps permissions for Fedora SELinux
    networks:
      - scraper-network
    ports:
      - "8000:8000"
      - "5173:5173"

  # Postgres 18 Database
  db:
    image: postgres:18-alpine
    container_name: scraper-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: scraper_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      # Stores your DB data on your HDD so it persists
      - ./docker/postgres/data:/var/lib/postgresql/data:z
    networks:
      - scraper-network
    ports:
      - "5432:5432"

networks:
  scraper-network:
    driver: bridge
